name: Deploy to itch.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-itch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ITCH_GAME: ${{ vars.ITCH_GAME || 'frank-owl/shadowmario' }}
      ITCH_SOURCE_CHANNEL: ${{ vars.ITCH_SOURCE_CHANNEL || 'source' }}
      ITCH_WEB_CHANNEL: ${{ vars.ITCH_WEB_CHANNEL || 'web' }}
      PYGBAG_VERSION: "0.9.3"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup butler
        uses: remarkablegames/setup-butler@v2

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pygbag==${PYGBAG_VERSION}"

      - name: Build release archive
        run: |
          mkdir -p dist
          git archive --format=zip --output dist/shadowmario-source.zip HEAD

      - name: Build HTML5 web bundle
        run: |
          python -m pygbag --build --archive --ume_block 0 --disable-sound-format-error main.py
          test -f build/web.zip

      - name: Resolve playable web channel
        id: resolve_web_channel
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          python -c "exec('''import json\nimport os\nimport re\nimport urllib.request\n\ngame = os.environ[\"ITCH_GAME\"]\nfallback = os.environ.get(\"ITCH_WEB_CHANNEL\", \"web\")\nowner, slug = game.split(\"/\", 1)\npage_url = f\"https://{owner}.itch.io/{slug}\"\n\ndef set_output(value: str) -> None:\n    with open(os.environ[\"GITHUB_OUTPUT\"], \"a\", encoding=\"utf-8\") as f:\n        f.write(f\"channel={value}\\\\n\")\n\ntry:\n    html = urllib.request.urlopen(page_url).read().decode(\"utf-8\", \"ignore\")\n    game_match = re.search(r\"name=\\\"itch:path\\\" content=\\\"games/(\\\\d+)\\\"\", html)\n    upload_match = re.search(r\"https://html-classic\\\\.itch\\\\.zone/html/(\\\\d+)/index\\\\.html\", html)\n\n    if not game_match or not upload_match:\n        raise RuntimeError(\"Could not resolve game_id or playable upload id from page\")\n\n    game_id = game_match.group(1)\n    playable_upload_id = upload_match.group(1)\n    api_url = f\"https://itch.io/api/1/{os.environ['BUTLER_API_KEY']}/game/{game_id}/uploads\"\n    payload = json.loads(urllib.request.urlopen(api_url).read().decode(\"utf-8\", \"ignore\"))\n    uploads = payload.get(\"uploads\", payload if isinstance(payload, list) else [])\n\n    channel = None\n    for upload in uploads:\n        if str(upload.get(\"id\")) == playable_upload_id:\n            channel = upload.get(\"channel_name\") or upload.get(\"channel\")\n            break\n\n    if not channel:\n        raise RuntimeError(\"Could not resolve playable channel from uploads API\")\n\n    print(f\"Resolved playable channel: {channel}\")\n    set_output(channel)\nexcept Exception as exc:\n    print(f\"Channel auto-detect failed: {exc}\")\n    print(f\"Fallback channel: {fallback}\")\n    set_output(fallback)\n''')"

      - name: Push source package to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler push dist/shadowmario-source.zip "${ITCH_GAME}:${ITCH_SOURCE_CHANNEL}" --userversion "${GITHUB_SHA::7}"

      - name: Push web package to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler push build/web.zip "${ITCH_GAME}:${{ steps.resolve_web_channel.outputs.channel }}" --userversion "${GITHUB_SHA::7}"
