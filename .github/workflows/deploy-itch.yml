name: Deploy to itch.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-itch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ITCH_GAME: ${{ vars.ITCH_GAME || 'frank-owl/shadowmario' }}
      ITCH_SOURCE_CHANNEL: ${{ vars.ITCH_SOURCE_CHANNEL || 'source' }}
      ITCH_WEB_CHANNEL: ${{ vars.ITCH_WEB_CHANNEL || 'web' }}
      PYGBAG_VERSION: "0.9.3"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup butler
        uses: remarkablegames/setup-butler@v2

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pygbag==${PYGBAG_VERSION}"

      - name: Build release archive
        run: |
          mkdir -p dist
          git archive --format=zip --output dist/shadowmario-source.zip HEAD

      - name: Build HTML5 web bundle
        run: |
          python -m pygbag --build --archive --ume_block 0 --disable-sound-format-error main.py
          test -f build/web.zip

      - name: Push source package to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler push dist/shadowmario-source.zip "${ITCH_GAME}:${ITCH_SOURCE_CHANNEL}" --userversion "${GITHUB_SHA::7}"

      - name: Push web package to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler push build/web.zip "${ITCH_GAME}:${ITCH_WEB_CHANNEL}" --userversion "${GITHUB_SHA::7}"
